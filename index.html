<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ad Structure Universal Hub</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --border-color: #334155;
            --primary-color: #38bdf8;
            --primary-hover: #0284c7;
            --accent-color: #f43f5e;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --input-bg: #0f172a;
            --lock-bg: #475569;
            --success-color: #10b981;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); padding: 24px; min-height: 100vh; }
        .container { max-width: 1280px; margin: 0 auto; }

        header { margin-bottom: 20px; text-align: center; border-bottom: 1px solid var(--border-color); padding-bottom: 16px; }
        header h1 { font-size: 24px; color: var(--primary-color); margin-bottom: 6px; }
        header p { color: var(--text-muted); font-size: 13px; }

        .tab-nav { display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 12px; }
        .tab-btn { background: var(--card-bg); color: var(--text-muted); border: 1px solid var(--border-color); padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 14px; transition: all 0.2s; }
        .tab-btn.active { background: var(--primary-color); color: #0f172a; border-color: var(--primary-color); }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .result-section { position: sticky; top: 15px; z-index: 100; background: rgba(30, 41, 59, 0.95); backdrop-filter: blur(10px); border: 2px solid var(--primary-color); border-radius: 12px; padding: 18px; margin-bottom: 24px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5); }
        .result-title { font-size: 12px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; display: flex; justify-content: space-between; }
        .result-box { display: flex; align-items: center; gap: 12px; background: var(--input-bg); padding: 12px 16px; border-radius: 8px; border: 1px solid var(--border-color); }
        .naming-string { font-family: 'Courier New', Courier, monospace; font-size: 16px; font-weight: bold; color: var(--primary-color); word-break: break-all; flex: 1; }
        .btn-copy { background-color: var(--primary-color); color: #0f172a; border: none; padding: 8px 16px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: all 0.2s; }
        .btn-copy:hover { background-color: var(--primary-hover); color: white; }

        .grid-layout { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 18px; }
        .field-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 10px; padding: 16px; display: flex; flex-direction: column; gap: 8px; position: relative; }
        .field-card:focus-within { border-color: var(--primary-color); }
        .field-header { display: flex; justify-content: space-between; align-items: center; }
        .field-title { font-size: 14px; font-weight: 600; color: var(--text-main); }
        .badge-locked { font-size: 11px; background-color: var(--accent-color); color: white; padding: 2px 6px; border-radius: 4px; display: none; font-weight: bold; }

        .select-wrapper { display: flex; gap: 6px; }
        select, input[type="text"] { width: 100%; background: var(--input-bg); color: var(--text-main); border: 1px solid var(--border-color); padding: 9px 12px; border-radius: 6px; font-size: 14px; outline: none; }
        select:disabled { background: var(--lock-bg); cursor: not-allowed; opacity: 0.7; }
        .btn-add-enum { background: #334155; color: var(--primary-color); border: 1px solid var(--border-color); padding: 0 12px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px; }

        .field-note { font-size: 12px; color: var(--text-muted); min-height: 38px; line-height: 1.4; background: rgba(15, 23, 42, 0.5); padding: 8px; border-radius: 4px; border-left: 3px solid var(--primary-color); }
        .error-msg { color: var(--accent-color); font-size: 12px; display: none; margin-top: 4px; }
        .toast { position: fixed; bottom: 30px; right: 30px; background: var(--success-color); color: white; padding: 12px 24px; border-radius: 8px; font-weight: bold; display: none; z-index: 1000; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

        .toolbar { display: flex; justify-content: space-between; align-items: center; background: var(--card-bg); padding: 16px 20px; border-radius: 10px; border: 1px solid var(--border-color); margin-top: 30px; }
        .btn-secondary { background: transparent; color: var(--text-main); border: 1px solid var(--border-color); padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; }
        .btn-secondary:hover { background: var(--border-color); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>📋 Ad Structure Universal Hub</h1>
        <p>12-Field Precision Ad Naming Module · Integrated Data Source System</p>
    </header>

    <div class="tab-nav">
        <button class="tab-btn" onclick="switchTab('campaign')">🚀 Campaign Name</button>
        <button class="tab-btn" onclick="switchTab('adgroup')">📦 AdGroup Name</button>
        <button class="tab-btn active" onclick="switchTab('ad')">🖼️ Ad Name (12-Field System)</button>
    </div>

    <!-- Placeholder Tab Panels -->
    <div id="tab-campaign" class="tab-content"><div style="padding:40px; text-align:center; color:var(--text-muted);">Ad Campaign Level Workspace</div></div>
    <div id="tab-adgroup" class="tab-content"><div style="padding:40px; text-align:center; color:var(--text-muted);">Ad Group Level Workspace</div></div>

    <!-- Tab 3: 12-Field Ad Creative Naming Generator -->
    <div id="tab-ad" class="tab-content active">
        <div class="result-section">
            <div class="result-title">
                <span>生成的 Ad 名称 (Generated Ad Name)</span>
                <span>12/12 字段有效</span>
            </div>
            <div class="result-box">
                <div id="ad-naming-output" class="naming-string">--</div>
                <button class="btn-copy" onclick="copyAdName()">复制名称 (Copy)</button>
            </div>
        </div>

        <div class="grid-layout" id="ad-grid"></div>

        <div class="toolbar">
            <span style="font-size: 13px; color: var(--text-muted);">💡 规则：1. pic/gif 自动锁定 Source Type 为 unlisted；2. Custom 禁用下划线；3. 新增枚举持久化写入 JSON。</span>
            <div style="display: flex; gap: 10px;">
                <button class="btn-secondary" onclick="exportJsonConfig()">导出 JSON 字典</button>
                <button class="btn-secondary" onclick="resetAdConfig()">恢复初始配置</button>
            </div>
        </div>
    </div>
</div>

<div id="toast" class="toast">复制成功！</div>

    },
    {

      "options": [
        {"value": "vid", "note": "Standard video ad creative covering product features, unboxing, security camera installations, or real defense footage clips."},

        {"value": "public", "note": "Public BGC video published on the official YouTube brand channel."},

      ]
    },
    {
      "id": "creative-channel", "name": "7. creative-channel (Creative Channel)", "type": "select", "allow_custom": true,

      ]
    },
    {
      "id": "creative-discount", "name": "8. creative-discount (Creative Discount)", "type": "select", "allow_custom": true,
      "options": [
        {"value": "no disc", "note": "Full-price standard creative without any discount callouts or promotional overlays."},
        {"value": "flat disc", "note": "Dollar-off discount creative showing a specific monetary reduction (e.g., Save $50 / $30 Off)."},
        {"value": "percent disc", "note": "Percentage-off discount creative showing a proportional price cut (e.g., 20% OFF / 30% OFF)."},
        {"value": "spend save", "note": "Tiered threshold discount creative incentivizing higher spend (e.g., Spend $200 Save $40)."},

    },

      "options": [
        {"value": "all", "note": "Universal asset bundle accommodating cross-platform responsive sizes and multi-ratio aspect configurations."},
        {"value": "16:9", "note": "Horizontal widescreen aspect ratio optimized for YouTube desktop feeds, TV displays, and traditional landscape camera video previews."},
        {"value": "9:16", "note": "Full-screen vertical mobile aspect ratio tailored for TikTok, Instagram Reels, YouTube Shorts, and Meta Stories."},
        {"value": "1:1", "note": "Square aspect ratio standard for Meta feed image carousels, Criteo dynamic feeds, and desktop shopping placements."}
      ]
    },
    {
      "id": "ksp", "name": "10. ksp (KSP)", "type": "select", "allow_custom": true,
      "options": [
        {"value": "allksp"}, {"value": "360"}, {"value": "180"}, {"value": "16mp"},
        {"value": "4k"}, {"value": "solar"}, {"value": "continuous recording"}, {"value": "magnetic"}
      ]
    },
    {
      "id": "project", "name": "11. project (Project)", "type": "select", "allow_custom": true,
      "options": [
        {"value": "aon", "note": "Always-On: Ever-green perpetual advertising campaign running continuously outside major promotional events."},
        {"value": "new", "note": "New Product Launch: Go-to-market campaign introducing a newly released security camera model."},
        {"value": "relaunch", "note": "Re-launch Campaign: Strategic marketing push to reignite demand and sales momentum for mature camera models."},
        {"value": "26spring", "note": "2026 Spring Sale: Promotional campaign targeting home renovation, garden, and outdoor security upgrade season."},
        {"value": "26summer", "note": "2026 Summer Sale: Vacation and outdoor security campaign focusing on home protection while traveling."},
        {"value": "26fall", "note": "2026 Fall Sale: Autumn home prep and shoulder-season promotional campaign."},
        {"value": "26winter", "note": "2026 Winter Sale: Year-end clear-out and cold-weather outdoor monitoring campaign."},
        {"value": "26anni", "note": "2026 Anniversary Sale: Brand anniversary celebration event featuring site-wide discount bundles."},
        {"value": "26pd", "note": "2026 Prime Day: Mid-year marquee Amazon/DTC shopping festival promotion."},
        {"value": "26fpd", "note": "2026 Fall Prime Day: Autumn Prime Big Deals / Fall shopping event campaign."},
        {"value": "26bfcm", "note": "2026 Black Friday & Cyber Monday: Q4 peak holiday shopping mega event campaign."},
        {"value": "26easter", "note": "2026 Easter Sale: Spring holiday family and safety promo event."},
        {"value": "26father", "note": "2026 Father's Day Sale: Tech and smart home gift campaign targeting DIY and dad demographics."},
        {"value": "26mother", "note": "2026 Mother's Day Sale: Smart home peace-of-mind gift campaign."},
        {"value": "26school", "note": "2026 Back to School: Late-summer home and dorm/rental security campaign."}
      ]
    },
    {
      "id": "custom", "name": "12. custom (Custom)", "type": "input",
      "placeholder": "e.g. hero-v1 (lowercase, hyphens allowed, no underscores)"
    }
  ]
};

let currentAdConfig = JSON.parse(localStorage.getItem('ad_naming_config_v12')) || defaultAdSchema;
let productCodeMap = {};
let adSelectedValues = {};

async function loadProductCodeMap() {
    try {
        const resp = await fetch('./product-code-map.json?t=' + Date.now());
        if (resp.ok) {
            productCodeMap = await resp.json();
            updateProductCodeDropdown();
        }
    } catch (e) {
        console.warn('product-code-map.json not found, using fallback options.');
    }
}

function switchTab(layer) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.querySelector(`[onclick="switchTab('${layer}')"]`).classList.add('active');
  document.getElementById(`tab-${layer}`).classList.add('active');
}

function initAdForm() {
  const grid = document.getElementById('ad-grid');
  grid.innerHTML = '';

  currentAdConfig.fields.forEach(field => {
    const card = document.createElement('div');
    card.className = 'field-card';

    let headerHTML = `
      <div class="field-header">
        <span class="field-title">${field.name}</span>
        <span class="badge-locked" id="lock-badge-${field.id}">LOCKED</span>
      </div>
    `;

    let bodyHTML = '';
    if (field.type === 'select') {
      let optionsHTML = field.options.map(opt => `<option value="${opt.value}">${opt.value}</option>`).join('');
      bodyHTML = `
        <div class="select-wrapper">
          <select id="input-${field.id}" onchange="handleSelectChange('${field.id}')">
            ${optionsHTML}
          </select>
          ${field.allow_custom ? `<button class="btn-add-enum" title="添加新枚举" onclick="addNewEnum('${field.id}')">+</button>` : ''}
        </div>
        <div class="field-note" id="note-${field.id}">--</div>
      `;
    } else if (field.type === 'input') {
      bodyHTML = `
        <input type="text" id="input-${field.id}" placeholder="${field.placeholder}" oninput="handleInputChange('${field.id}')" />
        <div class="error-msg" id="error-${field.id}">严禁下划线 (_)！只允许小写字母、数字及中划线 (-)。</div>
        <div class="field-note" id="note-${field.id}">自定义后缀标识（只能用小写字母、数字和中划线 -，禁止下划线）</div>
      `;
    }

    card.innerHTML = headerHTML + bodyHTML;
    grid.appendChild(card);

    if (field.type === 'select' && field.options.length > 0) {
      adSelectedValues[field.id] = field.options[0].value;
    } else {
      adSelectedValues[field.id] = '';
    }
  });

  loadProductCodeMap();
  updateNotesAll();
  evaluateCascadeRules();
  generateAdNaming();
}

function handleSelectChange(fieldId) {
  const selectElem = document.getElementById(`input-${fieldId}`);
  adSelectedValues[fieldId] = selectElem.value;

  if (fieldId === 'creative-product-type') {
      updateProductCodeDropdown();
  }

  updateNote(fieldId);
  if (fieldId === 'creative-type') evaluateCascadeRules();
  generateAdNaming();
}

function updateProductCodeDropdown() {
  const typeVal = adSelectedValues['creative-product-type'] || 'all';
  const prodSelect = document.getElementById('input-creative-product');
  if (!prodSelect) return;

  let codes = ['all'];
  if (productCodeMap[typeVal]) {
      codes = productCodeMap[typeVal];
  } else if (typeVal === 'all') {
      let merged = [];
      Object.values(productCodeMap).forEach(arr => { if (Array.isArray(arr)) merged = merged.concat(arr); });
      codes = ['all'].concat([...new Set(merged)].filter(c => c !== 'all').sort());
  }

  prodSelect.innerHTML = codes.map(c => `<option value="${c}">${c}</option>`).join('');
  adSelectedValues['creative-product'] = codes[0] || 'all';
  prodSelect.value = adSelectedValues['creative-product'];
}

function handleInputChange(fieldId) {
  const inputElem = document.getElementById(`input-${fieldId}`);
  const errorElem = document.getElementById(`error-${fieldId}`);
  let val = inputElem.value.toLowerCase().replace(/_/g, '-');
  inputElem.value = val;

  if (val && !/^[a-z0-9-]+$/.test(val)) {
    errorElem.style.display = 'block';
  } else {
    errorElem.style.display = 'none';
  }

  adSelectedValues[fieldId] = val;
  generateAdNaming();
}

function evaluateCascadeRules() {
  const typeValue = adSelectedValues['creative-type'];
  const sourceTypeSelect = document.getElementById('input-creative-source-type');
  const lockBadge = document.getElementById('lock-badge-creative-source-type');

  if (typeValue === 'pic' || typeValue === 'gif') {
    sourceTypeSelect.value = 'unlisted';
    sourceTypeSelect.disabled = true;
    adSelectedValues['creative-source-type'] = 'unlisted';
    lockBadge.style.display = 'inline-block';
    lockBadge.innerText = 'LOCKED (pic/gif)';
  } else {
    sourceTypeSelect.disabled = false;
    lockBadge.style.display = 'none';
  }
  updateNote('creative-source-type');
}

function updateNote(fieldId) {
  const fieldObj = currentAdConfig.fields.find(f => f.id === fieldId);
  const noteElem = document.getElementById(`note-${fieldId}`);
  if (!fieldObj || fieldObj.type !== 'select') return;

  const currentVal = adSelectedValues[fieldId];
  const optObj = fieldObj.options ? fieldObj.options.find(o => o.value === currentVal) : null;
  noteElem.innerText = (optObj && optObj.note) ? optObj.note : '（无特定说明）';
}

function updateNotesAll() {
  currentAdConfig.fields.forEach(f => { if (f.type === 'select') updateNote(f.id); });
}

function addNewEnum(fieldId) {
  const fieldObj = currentAdConfig.fields.find(f => f.id === fieldId);
  const newVal = prompt(`要在 [${fieldObj.name}] 中新增的枚举值：`);
  if (!newVal || !newVal.trim()) return;

  const cleanVal = newVal.trim().toLowerCase();
  if (fieldObj.options.some(o => o.value === cleanVal)) {
    alert('该枚举值已存在！'); return;
  }

  const noteInput = prompt(`（可选）输入 [${cleanVal}] 的说明 note：`) || '';
  fieldObj.options.push({ value: cleanVal, note: noteInput.trim() });
  localStorage.setItem('ad_naming_config_v12', JSON.stringify(currentAdConfig));

  const selectElem = document.getElementById(`input-${fieldId}`);
  const newOption = document.createElement('option');
  newOption.value = cleanVal;
  newOption.innerText = cleanVal;
  selectElem.appendChild(newOption);
  selectElem.value = cleanVal;

  adSelectedValues[fieldId] = cleanVal;
  updateNote(fieldId);
  generateAdNaming();
  showToast(`新枚举 [${cleanVal}] 已成功追加！`);
}

function generateAdNaming() {
  const parts = currentAdConfig.fields.map(f => (adSelectedValues[f.id] || '').trim());
  document.getElementById('ad-naming-output').innerText = parts.join('_');
}

function copyAdName() {
  const str = document.getElementById('ad-naming-output').innerText;
  if (!str || str === '--') return;
  navigator.clipboard.writeText(str).then(() => showToast('已复制广告素材名称！'));
}

function exportJsonConfig() {
    const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(currentAdConfig, null, 2));
    const dlAnchor = document.createElement('a');
    dlAnchor.setAttribute("href", dataStr);
    dlAnchor.setAttribute("download", "ad-name-config.json");
    document.body.appendChild(dlAnchor);
    dlAnchor.click();
    dlAnchor.remove();
}

function resetAdConfig() {
    if (confirm('确定恢复初始配置吗？')) {
        localStorage.removeItem('ad_naming_config_v12');
        currentAdConfig = JSON.parse(JSON.stringify(defaultAdSchema));
        initAdForm();
        showToast('已重置为初始默认配置！');
    }
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.innerText = msg;
  toast.style.display = 'block';
  setTimeout(() => toast.style.display = 'none', 2000);
}

window.onload = initAdForm;
</script>
</body>
</html>
